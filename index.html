<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สุ่มร้านอาหาร</title>
  <link rel="stylesheet" href="food_randomizer.css">
</head>
<body>
  <div class="wrap">

    <!-- Hero -->
    <div class="hero">
      <div class="top-bar">
        <h1>🍜 สุ่มร้านอาหาร</h1>
        <button class="dark-toggle" id="darkBtn" onclick="toggleDark()">🌙 Dark</button>
      </div>
      <p class="sub">!ใส่งบแล้วกด สุ่มเลย!</p>
    </div>

    <!-- Content -->
    <div class="content">

      <div class="mode-tabs">
        <button class="mode-tab active" id="tab-savory" onclick="switchType('savory')">🍛 ของคาว</button>
        <button class="mode-tab" id="tab-sweet" onclick="switchType('sweet')">🍡 ของหวาน</button>
      </div>

      <div class="mode-tabs" style="margin-bottom:1.25rem">
        <button class="mode-tab active" id="loc-all" onclick="switchLocation('all')">📍 ทั้งหมด</button>
        <button class="mode-tab" id="loc-mall" onclick="switchLocation('mall')">🏬 ในห้าง</button>
        <button class="mode-tab" id="loc-outside" onclick="switchLocation('outside')">🏠 นอกห้าง</button>
      </div>

      <div class="input-row">
        <label>งบประมาณ</label>
        <div class="budget-wrap">
          <span>฿</span>
          <input type="number" id="budget" placeholder="เช่น 200" min="1" />
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <p class="section-label" style="margin-bottom:0">ประเภทร้าน</p>
        <div style="display:flex;gap:10px"><button onclick="resetAllCats()" 
          style="font-size:11px;font-family:'Sarabun',sans-serif;background:none;border:none;color:var(--accent);cursor:pointer;font-weight:600;padding:2px 0;">เลือกทั้งหมด ↺</button><button 
          onclick="clearAllCats()"
          style="font-size:11px;font-family:'Sarabun',sans-serif;background:none;border:none;color:var(--text-muted);cursor:pointer;font-weight:600;padding:2px 0;">เอาออกทั้งหมด ✕</button></div>
      </div>
      <div class="tags" id="tags"></div>

      <button class="spin-btn" onclick="spin()">🎲 สุ่มเลย!</button>

      <p class="list-btns-label">ดูร้านทั้งหมด</p>
      <div class="list-btns">
        <button class="mall-btn" onclick="openAllByLocation('mall')">🏬 ร้านในห้างทั้งหมด</button>
        <button class="mall-btn" onclick="openAllByLocation('outside')">🏠 ร้านนอกห้างทั้งหมด</button>
        <button class="mall-btn" onclick="openAllByLocation('both')">🏬🏠 ร้านที่มีทั้งสองที่</button>
      </div>

      <div id="results"></div>

    </div>
  </div>

  <script src="food_randomizer.js"></script>
  <script>
    function toggleDark() {
      const isDark = document.body.classList.toggle('dark');
      document.getElementById('darkBtn').textContent = isDark ? '☀️ Light' : '🌙 Dark';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('darkBtn').textContent = '☀️ Light';
    }
  </script>
</body>
</html>
